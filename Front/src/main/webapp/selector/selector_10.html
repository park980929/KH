<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>

<style type="text/css">
	
/* 보여지는 화면에서 첫번째 줄 선택 */
p::first-line {
	color: blue;
}

/* 문장에 첫번째 글자 선택 */
p::first-letter {
	color: red;
	font-size: 20px
}

/*----------------------------------------------------------------*/

/* span태그의 앞부분에 가상 요소를 추가한다 */
span::before {
	
	/* 가상 요소에 적용될 컨텐츠(내용물)  */
	/* content: "<h1> span <br> before"; */
	content: "span \A before";
	
	/* \A -개행문자(ASCII 10)를 나타낸다 */
	
	/* 공백문자 처리방식 변경하기 */
	white-space: pre;
	
	/* 가상 요소에 CSS스타일 적용할 수 있다 */
	color: orange;
	background-color: gray; 
}
/*----------------------------------------------------------------*/

.new::after {
	content: "new";
	
	font-size: 10px;
	background-color: #f66;
	color: #fff;
	
	padding: 0.2px;
	
	border-radius: 3px;
	
	/* 수직 정렬 */
/* 	vertical-align: baseline; */
	vertical-align: middle;
}	
/*----------------------------------------------------------------*/	
	/* 클래스 속성값으로 new가 없는 p태그 선택  */
	p:not(.new) {
		background-color: #eee;
}
</style>

</head>
<body>

<p class="new"> 첫번째 p 태그 </p>
<span>두 번째(span)</span>
<div class="new">세 번째(div)</div>
<p>네번째(p).고동을 행복스럽고 듣기만 피부가 그들의 힘있다. <br>
우는 이것은 위하여 것이다. 같지 가치를 얼마나 위하여 인생에 방지하는 보라. 
이상은 같지 우리 보는 이 목숨이 때까지 것이다. 크고 얼마나 눈이 가치를 이것이다. </p>

</body>
</html>
