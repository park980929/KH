<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>

<style type="text/css">

p{
/* 	white-space: normal;*/
/* 	white-space: nowrap; */
/* 	white-space: pre;  */
/*  white-space: pre-wrap; */
	white-space: pre-line;
}

/* nomal (기본값)  */
/* 띄어쓰기, 개행, 탭 모두 띄어쓰기 한 개로 바꾼다  */
/* 자동 줄바꿈 O  */

/* nowrap  */
/* 띄어쓰기, 개행, 탭 모두 띄어쓰기 한 개로 바꾼다  */
/* 자동 줄바꿈 X  */

/* pre */
/* 공백문자 전부 적용된다 */
/* 자동 줄바꿈 X */

/* pre wrap */
/* 공백문자 전부 적용된다 */
/* 자동 줄바꿈 O */

/* pre line */
/* 개행문자만 적용된다 */
/* 띄어쓰기, 탭을 띄어쓰기 한 개로 바꾼다 */
/* 자동줄바꿈 O */

</style>

</head>
<body>

<p>고동을 행복스럽고 듣기만 피부가 그들의 힘있다. 
우는 이것은 위하여 것이다. 같지 가치를 얼마나 위하여 인생에 방지하는 보라. <br>
이상은 같지 우리 보는 이 목숨이 때까지 것이다. 크고 얼마나 눈이 가치를 이것이다. 
하는 밥을 수 꽃이 피는 이상은 천하를 뭇 말이다.</p>

</body>
</html>
